<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let age= prompt("Please enter your age as of today:")
        age=Number.parseInt(age)
        let value=confirm("Are you sure you want to submit your age?")
        if(value)
        {
            if(age>=18)
            alert("eligible to vote")
            else
            alert("not eligible please try after " + (18 - age) + " years")
        }
    </script>
</body>
</html>
